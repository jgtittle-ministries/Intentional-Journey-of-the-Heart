instruments:
  PSFA:
    name: "Personal Spiritual Formation Assessment"
    measures: "Affective Taxonomy stage; Image of God 4Rs"
    type: quantitative
    frequency: "Baseline, Month 6, Month 12"
    tests_hypotheses: [V4.LotS-H3, V4.LotS-H4, V4.LotS-I2, V4.LotS-I3, V4.LotS-F2]
  STI-A:
    name: "Scripture Trust Index — Adapted"
    measures: "Scripture trust level"
    type: quantitative
    frequency: "Baseline, Month 6, Month 12"
    tests_hypotheses: [V4.LotS-F1, V4.LotS-F2, V4.LotS-H1]
    source: "Adapted from Hall (2017) and epistemic trust research"
  Image_of_God_4Rs:
    name: "Image of God 4Rs Self-Assessment"
    measures: "4R profile — Reason, Rulership, Relationship, Righteousness"
    type: quantitative
    frequency: "Baseline, Month 12"
    tests_hypotheses: [V4.LotS-I2, V4.LotS-I3]
  SDFL:
    name: "Spiritual Disciplines Frequency Log"
    measures: "Discipline practice frequency per week"
    type: quantitative
    frequency: "Weekly"
    tests_hypotheses: [V4.LotS-H4]
  NRP:
    name: "Narrative Reflection Protocol"
    measures: "Formation narrative; trial response; heart change; 4R growth"
    type: qualitative
    frequency: "Monthly"
    tests_hypotheses: [V4.LotS-F3, V4.LotS-H1, V4.LotS-H3, V4.LotS-I2]
  SOP:
    name: "Session Observation Protocol"
    measures: "Session engagement; Tell Rate; stage-transition events"
    type: mixed
    frequency: "Every session"
    tests_hypotheses: [V4.LotS-F4, V4.LotS-H4]
  GSFP:
    name: "Group Stage Formation Profile"
    measures: "Group stage distribution; GATS trajectory"
    type: qualitative_visual
    frequency: "Quarterly"
    tests_hypotheses: [V4.LotS-H3]
  EWI:
    name: "External Witness Interview"
    measures: "Observable behavioral change reported by non-participant witnesses"
    type: qualitative
    frequency: "Baseline, Month 12"
  CSFA:
    name: "Community Spiritual Formation Assessment"
    measures: "Community-level formation indicators"
    type: quantitative
    frequency: "Quarterly"
  OT5_Supplementary_Interview:
    name: "OT-5 Supplementary Interview"
    measures: "Precursor narrative for rapid stage transitions"
    type: qualitative
    frequency: "Triggered by rapid transition events"

